name: Deploy Backend to EC2

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-backend.yml'

env:
  AWS_REGION: ap-northeast-2
  ECR_REPOSITORY: saa-quiz-backend

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image to Amazon ECR
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          cd backend
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker tag $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG $ECR_REGISTRY/$ECR_REPOSITORY:latest
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Deploy to EC2 via SSM
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          INSTANCE_IDS: "${{ secrets.EC2_INSTANCE_ID_1 }} ${{ secrets.EC2_INSTANCE_ID_2 }}"
        run: |
          # SSM 명령 실행
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids $INSTANCE_IDS \
            --document-name "AWS-RunShellScript" \
            --parameters commands="[
              \"aws ecr get-login-password --region ${{ env.AWS_REGION }} | docker login --username AWS --password-stdin $ECR_REGISTRY\",
              \"docker stop saa-quiz-backend || true\",
              \"docker rm saa-quiz-backend || true\",
              \"docker pull $ECR_REGISTRY/${{ env.ECR_REPOSITORY }}:latest\",
              \"docker run -d --name saa-quiz-backend -p 8000:8000 --env-file /home/ubuntu/.env.production --restart unless-stopped $ECR_REGISTRY/${{ env.ECR_REPOSITORY }}:latest\",
              \"docker image prune -af\"
            ]" \
            --output text \
            --query "Command.CommandId")

          echo "SSM Command ID: $COMMAND_ID"

          # 각 인스턴스별로 명령 완료 대기
          for INSTANCE_ID in $INSTANCE_IDS; do
            echo "Waiting for command to complete on instance $INSTANCE_ID..."
            aws ssm wait command-executed \
              --command-id "$COMMAND_ID" \
              --instance-id "$INSTANCE_ID"

            echo "✅ Deployment completed on instance $INSTANCE_ID"
          done

          echo "🚀 All instances deployed successfully!"
