name: Deploy Backend to EC2

on:
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - ".github/workflows/deploy-backend.yml"

env:
  AWS_REGION: ap-northeast-2
  ECR_REPOSITORY: saa-quiz-backend

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build, tag, and push image to Amazon ECR
        id: build-image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to EC2 via SSM (was1)
        run: |
          REGISTRY=${{ steps.login-ecr.outputs.registry }}
          REPOSITORY=${{ env.ECR_REPOSITORY }}
          IMAGE=$REGISTRY/$REPOSITORY:latest
          
          aws ssm send-command \
            --instance-ids "i-040c36a7ea11efffa" \
            --document-name "AWS-RunShellScript" \
            --parameters '{"commands":[
              "aws ecr get-login-password --region ap-northeast-2 | docker login --username AWS --password-stdin '$REGISTRY'",
              "docker pull '$IMAGE'",
              "docker stop saa-quiz-backend || true",
              "docker rm saa-quiz-backend || true",
              "docker run -d --name saa-quiz-backend -p 8000:8000 --env-file /home/ubuntu/.env.production --restart unless-stopped '$IMAGE'"
            ]}'

      - name: Deploy to EC2 via SSM (was2)
        run: |
          REGISTRY=${{ steps.login-ecr.outputs.registry }}
          REPOSITORY=${{ env.ECR_REPOSITORY }}
          IMAGE=$REGISTRY/$REPOSITORY:latest

          aws ssm send-command \
            --instance-ids "i-02e20bbc54c5c81ed" \
            --document-name "AWS-RunShellScript" \
            --parameters '{"commands":[
              "aws ecr get-login-password --region ap-northeast-2 | docker login --username AWS --password-stdin '$REGISTRY'",
              "docker pull '$IMAGE'",
              "docker stop saa-quiz-backend || true",
              "docker rm saa-quiz-backend || true",
              "docker run -d --name saa-quiz-backend -p 8000:8000 --env-file /home/ubuntu/.env.production --restart unless-stopped '$IMAGE'"
            ]}'

      - name: Verify deployment
        run: |
          sleep 10
          aws ssm send-command \
            --instance-ids "i-040c36a7ea11efffa" \
            --document-name "AWS-RunShellScript" \
            --parameters '{"commands":["curl -f http://localhost:8000/health || exit 1"]}'
